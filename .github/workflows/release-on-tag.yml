# SSOT: swift-oss-doctor/templates/workflows/release-on-tag.yml
# タグ駆動リリース: semver タグの push で テスト → GitHub Release 自動生成。
# 旧 auto-release-on-merge.yml（release/v PR マージ発火）は main 直コミット運用では
# 一度も発火し得なかったため、この方式に置き換える。手編集せず distribute-workflows.sh で再配布する。
name: Release on Tag

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Run Tests
        run: swift test

      - name: Extract release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # CHANGELOG.md に該当セクションがあればそれを使う。無ければ auto-generate に任せる。
          if [ -f CHANGELOG.md ] && grep -q "## \[$VERSION\]" CHANGELOG.md; then
            awk "/## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > /tmp/release-notes.md
            echo "has_changelog=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changelog=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (from CHANGELOG)
        if: steps.notes.outputs.has_changelog == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file /tmp/release-notes.md

      - name: Create GitHub Release (auto-generated notes)
        if: steps.notes.outputs.has_changelog == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
