# SSOT: swift-oss-doctor/templates/workflows/tests.yml
# 全リポ共通のテストゲート。手編集せず distribute-workflows.sh で再配布する。
name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: macOS (swift test)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # library は Package.resolved を追跡しない（FAMILY_CHARTER §5）ため、
      # キャッシュキーは実質 Package.swift だけになる。.build ごとキャッシュすると
      # そこに含まれる解決結果（workspace-state.json + checkouts）が復元され続け、
      # 依存の新バージョンが出てもキャッシュが効く限り古い版でテストが通ってしまう。
      # 実際 agent-runtime は swift-a2a 0.7.0 の破壊的改名に未追随のまま Tests が
      # green を出し続けていた（キャッシュしない DocC ジョブだけが失敗していた）。
      # → ビルド成果物はキャッシュしつつ、解決は毎回やり直す。
      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve dependencies (fresh)
        run: swift package update

      - name: Build
        run: swift build

      - name: Run Tests
        run: swift test
